<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password · Staff Arts</title>
  <link href="https://fonts.googleapis.com/css2?family=Gloock&family=Instrument+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0c0e;
      --surface:  #141518;
      --border:   #222428;
      --teal:     #20a87c;
      --teal-bg:  rgba(32,168,124,0.08);
      --teal-dim: rgba(32,168,124,0.35);
      --text:     #eeeae1;
      --muted:    #9b9794;
      --error:    #e05252;
      --gold:     #c09e62;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(32,168,124,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(192,158,98,0.04) 0%, transparent 60%);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 48px 40px;
      position: relative;
      animation: fadeUp 0.5s ease both;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2px;
      background: linear-gradient(135deg, rgba(32,168,124,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Corner brackets */
    .card::after {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 18px; height: 18px;
      border-top: 2px solid var(--gold);
      border-left: 2px solid var(--gold);
      border-radius: 0;
      opacity: 0.6;
    }

    .bracket-br {
      position: absolute;
      bottom: -1px; right: -1px;
      width: 18px; height: 18px;
      border-bottom: 2px solid var(--gold);
      border-right: 2px solid var(--gold);
      opacity: 0.6;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-text {
      font-family: 'Gloock', serif;
      font-size: 26px;
      letter-spacing: 0.04em;
    }

    .logo-text span {
      color: var(--teal);
      font-style: italic;
      font-family: 'Instrument Serif', serif;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--teal-dim);
    }

    h1 {
      font-family: 'Gloock', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
      font-family: 'Instrument Serif', serif;
      font-style: italic;
    }

    .field {
      margin-bottom: 16px;
      position: relative;
    }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 1px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--teal-dim);
    }

    input::placeholder { color: var(--muted); opacity: 0.5; }

    .toggle-btn {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'Instrument Sans', sans-serif;
      padding: 0;
      transition: color 0.2s;
    }

    .toggle-btn:hover { color: var(--teal); }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 1px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover:not(:disabled) { opacity: 0.88; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 1px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }

    .msg.error {
      background: rgba(224,82,82,0.08);
      border: 1px solid rgba(224,82,82,0.25);
      color: var(--error);
      display: block;
    }

    .msg.success {
      background: var(--teal-bg);
      border: 1px solid var(--teal-dim);
      color: var(--teal);
      display: block;
    }

    /* Success state */
    .success-view {
      text-align: center;
      display: none;
      animation: fadeUp 0.4s ease both;
    }

    .success-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--teal-bg);
      border: 1px solid var(--teal-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .success-icon svg { color: var(--teal); }

    .success-view h2 {
      font-family: 'Gloock', serif;
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .success-view p {
      font-size: 13px;
      color: var(--muted);
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      line-height: 1.6;
    }

    .invalid-view {
      text-align: center;
    }

    .invalid-view h2 {
      font-family: 'Gloock', serif;
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 8px;
      color: var(--error);
    }

    .invalid-view p {
      font-size: 13px;
      color: var(--muted);
      font-family: 'Instrument Serif', serif;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="bracket-br"></div>

    <div class="logo">
      <div class="logo-text">STAFF <span>Arts</span></div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <!-- Invalid token view -->
    <div class="invalid-view" id="invalidView" style="display:none;">
      <h2>Invalid Link</h2>
      <p>This password reset link is missing or invalid.<br>Please request a new one.</p>
    </div>

    <!-- Reset form -->
    <div id="formView">
      <h1>Reset your password</h1>
      <p class="subtitle">Choose a new password for your account.</p>

      <div class="field">
        <label>New Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" />
        <button class="toggle-btn" type="button" onclick="togglePw('password', this)">Show</button>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" />
        <button class="toggle-btn" type="button" onclick="togglePw('confirm', this)">Show</button>
      </div>

      <div class="msg" id="msg"></div>

      <button class="btn" id="submitBtn" onclick="submit()">Reset Password</button>
    </div>

    <!-- Success view -->
    <div class="success-view" id="successView">
      <div class="success-icon">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2>Password updated</h2>
      <p>Your password has been reset successfully.<br>You can now sign in with your new password.</p>
    </div>
  </div>

  <script>
    const API = 'https://staff-arts-api.onrender.com';

    // Get token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('formView').style.display = 'none';
      document.getElementById('invalidView').style.display = 'block';
    }

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function submit() {
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password.length < 8) {
        showMsg('Password must be at least 8 characters.', 'error');
        return;
      }

      if (password !== confirm) {
        showMsg('Passwords do not match.', 'error');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch(`${API}/api/mobile/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById('formView').style.display = 'none';
          document.getElementById('successView').style.display = 'block';
        } else {
          showMsg(data.error || 'Something went wrong. Please try again.', 'error');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch (e) {
        showMsg('Network error. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
